# --- GenAI Recommender System: Conversational Prompt Templates ---
# These templates produce natural, concise conversational summaries.

# Standard recommendation prompt
standard_recommendation: |
  ### Retrieved Products:
  {context}

  ### User Request:
  Query: {query}
  Preferences: {preferences}

  ### Instructions:
  - Provide a short, natural conversational summary based on the products found.
  - Explain why these items were selected based on the user's query and preferences.
  - DO NOT list product names, prices, materials, or detailed specs in your text response.
  - DO NOT use markdown bullet points for product details.
  - Keep the response under 3 sentences.
  - Focus on your understanding of their interest.

  Response:

